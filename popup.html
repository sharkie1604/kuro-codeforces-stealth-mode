<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --bg: #030712;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            width: 280px;
            margin: 0;
            padding: 24px;
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* Animated Background Glow */
        body::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--accent);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
        }

        .header {
            margin-bottom: 28px;
        }

        .header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 500;
            margin-top: 4px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-text {
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Modernized Switch */
        .switch {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1e293b;
            transition: .4s cubic-bezier(0.18, 0.89, 0.35, 1.15);
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 3px;
            background-color: #94a3b8;
            transition: .4s cubic-bezier(0.18, 0.89, 0.35, 1.15);
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(56, 189, 248, 0.1);
            border-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }

        .footer {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .profile-link {
            width: 100%;
            text-align: center;
            text-decoration: none;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 10px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: 0.2s;
        }

        .profile-link:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            background: var(--accent);
            color: var(--bg);
        }

        .version {
            font-size: 0.6rem;
            color: #475569;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>KURO</h2>
        <div class="tagline">The Stealth Protocol</div>
    </div>

    <div class="card">
        <div class="toggle-row">
            <span class="status-text">Stealth Mode</span>
            <label class="switch">
                <input type="checkbox" id="zenToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="footer">
        <a href="https://codeforces.com/profile/sharkie1604" target="_blank" class="profile-link">
            DEV: @sharkie1604
        </a>
        <div class="version">BUILD v1.2.0-STABLE</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>

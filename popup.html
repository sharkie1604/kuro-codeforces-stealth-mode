<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        body {
            width: 260px;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .header {
            text-align: left;
            margin-bottom: 24px;
            border-left: 4px solid var(--accent);
            padding-left: 12px;
        }
        .header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }
        .header p {
            margin: 4px 0 0 0;
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 600;
        }
        .description {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .toggle-container {
            background: rgba(255, 255, 255, 0.03);
            padding: 14px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            transition: 0.3s;
        }
        .toggle-container:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .toggle-label {
            font-weight: 500;
            font-size: 0.9rem;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 42px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }
        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dev-info {
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        .profile-btn {
            background: transparent;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 12px;
            border: 1px solid var(--accent);
            border-radius: 6px;
            transition: 0.2s;
        }
        .profile-btn:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>KURO</h2>
        <p>Zero-Hint Mode</p>
    </div>
    <div class="description">
        Sharpen your intuition. By hiding tags and ratings, Kuro forces you to solve the problem, not the label.
    </div>
    <div class="toggle-container">
        <span class="toggle-label">Stealth Mode</span>
        <label class="switch">
            <input type="checkbox" id="zenToggle">
            <span class="slider"></span>
        </label>
    </div>
    <div class="footer">
        <div class="dev-info">
            V 1.0 <br>
            @sharkie1604
        </div>
        <a href="https://codeforces.com/profile/sharkie1604" target="_blank" class="profile-btn">
            VIEW PROFILE
        </a>
    </div>
    <script src="popup.js"></script>
</body>
</html>
